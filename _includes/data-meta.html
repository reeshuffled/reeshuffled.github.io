<div class="d-flex flex-wrap gap-2 mb-2">
    <span class="badge rounded-pill text-bg-secondary">{{ include.location }}</span>
    {% if include.enriched_by %}
    <a href="{{ include.enriched_url }}" target="_blank" rel="noopener"
        class="badge rounded-pill text-bg-info text-decoration-none">+ {{ include.enriched_by }}</a>
    {% endif %}
    {% if include.updated %}
    <span class="badge rounded-pill text-bg-secondary">Updated <span id="last-updated-date">{{ include.updated }}</span></span>
    {% endif %}
</div>
